<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seguros Carguill</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #f1f5f9; font-size: 14px; }

    /* LOGIN */
    #login-screen { display:flex; min-height:100vh; align-items:center; justify-content:center; background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%); }
    .login-card { background:#fff; border-radius:16px; padding:40px 36px; width:360px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
    .login-logo { font-size:28px; font-weight:800; color:#1e293b; margin-bottom:4px; }
    .login-sub { color:#64748b; font-size:13px; margin-bottom:28px; }

    /* PANEL */
    #panel-screen { display:none; }
    .sidebar { width:240px; min-height:100vh; background:#1e293b; color:#e2e8f0; flex-shrink:0; }
    .sidebar .brand { padding:18px 16px 12px; font-weight:700; font-size:15px; border-bottom:1px solid #334155; display:flex; align-items:center; gap:8px; }
    .estado-item { padding:7px 16px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
    .estado-item:hover,.estado-item.active { background:#334155; }
    .estado-dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:7px; flex-shrink:0; }
    .badge-count { background:#334155; color:#94a3b8; font-size:11px; padding:1px 6px; border-radius:10px; }
    .estado-item.active .badge-count { background:#475569; color:#e2e8f0; }
    .sidebar-footer { padding:12px 16px; border-top:1px solid #334155; margin-top:auto; }

    .conv-card { background:#fff; border-radius:8px; padding:11px 13px; margin-bottom:7px; cursor:pointer; border:2px solid transparent; transition:border-color .12s; }
    .conv-card:hover { border-color:#cbd5e1; }
    .conv-card.selected { border-color:#3b82f6; }
    .conv-nombre { font-weight:600; font-size:13px; }
    .conv-preview { color:#64748b; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .prioridad-badge { font-size:10px; padding:2px 6px; border-radius:10px; font-weight:700; }
    .p-critica { background:#fee2e2; color:#dc2626; }
    .p-alta    { background:#fef3c7; color:#d97706; }
    .p-normal  { background:#e0f2fe; color:#0284c7; }
    .p-baja    { background:#f1f5f9; color:#64748b; }

    #mensajes-wrap { display:flex; flex-direction:column; overflow-y:auto; max-height:calc(100vh - 330px); padding:10px; background:#f8fafc; border-radius:8px; gap:4px; }
    .burbuja { max-width:78%; padding:8px 12px; border-radius:12px; font-size:13px; word-break:break-word; }
    .burbuja-cliente  { background:#f1f5f9; align-self:flex-start; border-bottom-left-radius:3px; }
    .burbuja-agente   { background:#dcfce7; align-self:flex-end;   border-bottom-right-radius:3px; }
    .burbuja-sistema  { background:#fef9c3; align-self:center; font-size:11px; color:#92400e; }
    .burbuja-hora { font-size:10px; color:#94a3b8; margin-top:2px; }

    .kpi-card { background:#fff; border-radius:10px; padding:14px 18px; text-align:center; }
    .kpi-num  { font-size:26px; font-weight:800; color:#1e293b; }
    .kpi-lbl  { font-size:11px; color:#64748b; margin-top:1px; }

    .tab-pane-custom { display:none; }
    .tab-pane-custom.active { display:block; }
    .nota-item { background:#fffbeb; border-left:3px solid #f59e0b; padding:8px 11px; border-radius:0 6px 6px 0; margin-bottom:7px; font-size:13px; }
    .cot-item  { background:#f0fdf4; border-left:3px solid #22c55e; padding:8px 11px; border-radius:0 6px 6px 0; margin-bottom:7px; font-size:13px; }
    .hist-item { padding:5px 0; border-bottom:1px solid #f1f5f9; font-size:12px; color:#475569; }

    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     LOGIN
══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><i class="bi bi-shield-check text-primary me-2"></i>Carguill</div>
    <div class="login-sub">Panel de conversaciones · Seguros</div>
    <div id="login-error" class="alert alert-danger py-2 d-none small"></div>
    <div class="mb-3">
      <label class="form-label small fw-semibold">Correo</label>
      <input id="inp-email" type="email" class="form-control" placeholder="admin@carguill.com" />
    </div>
    <div class="mb-4">
      <label class="form-label small fw-semibold">Contraseña</label>
      <input id="inp-pass" type="password" class="form-control" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()" />
    </div>
    <button class="btn btn-primary w-100 fw-semibold" onclick="login()">
      <span id="login-spinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
      Entrar
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     PANEL PRINCIPAL
══════════════════════════════════════════ -->
<div id="panel-screen" class="d-flex">

  <!-- SIDEBAR -->
  <div class="sidebar d-flex flex-column">
    <div class="brand"><i class="bi bi-shield-check text-primary"></i>Carguill</div>

    <div class="px-3 pt-3 pb-1" style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;">Estados</div>
    <div id="estados-lista" style="overflow-y:auto;flex:1;"></div>

    <div class="sidebar-footer">
      <div class="text-muted small mb-2" id="sidebar-user" style="font-size:11px;"></div>
      <button class="btn btn-sm btn-outline-secondary w-100 text-start" onclick="cerrarSesion()" style="color:#94a3b8;border-color:#334155;font-size:12px;">
        <i class="bi bi-box-arrow-left me-1"></i>Cerrar sesión
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="flex-grow-1 p-3" style="min-width:0;overflow-y:auto;">

    <!-- KPIs -->
    <div class="row g-2 mb-3">
      <div class="col-3"><div class="kpi-card"><div class="kpi-num" id="kpi-nuevos">—</div><div class="kpi-lbl">Nuevos hoy</div></div></div>
      <div class="col-3"><div class="kpi-card"><div class="kpi-num text-warning" id="kpi-pendientes">—</div><div class="kpi-lbl">Sin respuesta</div></div></div>
      <div class="col-3"><div class="kpi-card"><div class="kpi-num text-primary" id="kpi-propuestas">—</div><div class="kpi-lbl">Propuestas hoy</div></div></div>
      <div class="col-3"><div class="kpi-card"><div class="kpi-num text-success" id="kpi-polizas">—</div><div class="kpi-lbl">Pólizas activadas</div></div></div>
    </div>

    <div class="row g-3">

      <!-- LISTA -->
      <div class="col-4">
        <div class="d-flex gap-2 mb-2">
          <input type="text" id="search-inp" class="form-control form-control-sm" placeholder="Buscar…" oninput="buscar(this.value)" />
          <select id="sort-sel" class="form-select form-select-sm" style="width:130px;" onchange="cargarLista()">
            <option value="mas_reciente">Recientes</option>
            <option value="mas_urgente">Urgentes</option>
            <option value="sin_respuesta">Sin respuesta</option>
          </select>
        </div>
        <div id="filtro-badge" class="mb-2" style="min-height:22px;"></div>
        <div id="lista-conv"></div>
        <div id="paginacion" class="d-flex justify-content-between align-items-center mt-2"></div>
      </div>

      <!-- DETALLE -->
      <div class="col-8">
        <div id="det-empty" class="d-flex align-items-center justify-content-center text-muted" style="min-height:60vh;">
          <div class="text-center"><i class="bi bi-chat-dots" style="font-size:48px;color:#cbd5e1;"></i><p class="mt-2">Selecciona una conversación</p></div>
        </div>

        <div id="det-panel" style="display:none;">
          <!-- Cabecera -->
          <div class="bg-white rounded-3 p-3 mb-2">
            <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
              <div>
                <h5 class="mb-0" id="det-nombre"></h5>
                <div class="text-muted small" id="det-tel"></div>
              </div>
              <div class="d-flex gap-2 align-items-center flex-wrap">
                <span id="det-tipo" class="badge bg-secondary"></span>
                <span id="det-estado" class="badge" style="font-size:11px;"></span>
                <span id="det-prioridad" class="prioridad-badge"></span>
              </div>
            </div>
            <div class="mt-2 d-flex gap-2 flex-wrap">
              <button class="btn btn-sm btn-outline-primary" onclick="abrirModalEstado()"><i class="bi bi-arrow-right-circle me-1"></i>Cambiar estado</button>
              <button class="btn btn-sm btn-outline-secondary" onclick="irTab('notas')"><i class="bi bi-sticky me-1"></i>Nota</button>
              <button class="btn btn-sm btn-outline-success" onclick="irTab('cotizaciones')"><i class="bi bi-currency-dollar me-1"></i>Cotización</button>
            </div>
          </div>

          <!-- Tabs -->
          <ul class="nav nav-tabs mb-2" id="det-tabs">
            <li class="nav-item"><a class="nav-link active" href="#" onclick="irTab('mensajes');return false">Mensajes</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="irTab('notas');return false">Notas</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="irTab('cotizaciones');return false">Cotizaciones</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="irTab('historial');return false">Historial</a></li>
          </ul>

          <div id="tab-mensajes" class="tab-pane-custom active">
            <div id="mensajes-wrap"></div>
          </div>

          <div id="tab-notas" class="tab-pane-custom">
            <textarea id="txt-nota" class="form-control form-control-sm mb-2" rows="2" placeholder="Escribe una nota interna…"></textarea>
            <button class="btn btn-sm btn-warning mb-3" onclick="guardarNota()">Guardar nota</button>
            <div id="lista-notas"></div>
          </div>

          <div id="tab-cotizaciones" class="tab-pane-custom">
            <div class="row g-2 mb-3">
              <div class="col-4"><input type="text" id="cot-aseg" class="form-control form-control-sm" placeholder="Aseguradora" /></div>
              <div class="col-3"><input type="number" id="cot-prima" class="form-control form-control-sm" placeholder="Prima MXN" /></div>
              <div class="col-5"><input type="text" id="cot-cobertura" class="form-control form-control-sm" placeholder="Descripción cobertura" /></div>
              <div class="col-4">
                <select id="cot-estado" class="form-select form-select-sm">
                  <option value="cotizando">Cotizando</option>
                  <option value="enviada">Enviada</option>
                  <option value="aceptada">Aceptada</option>
                  <option value="rechazada">Rechazada</option>
                </select>
              </div>
              <div class="col-8"><button class="btn btn-sm btn-success" onclick="guardarCotizacion()"><i class="bi bi-plus me-1"></i>Agregar cotización</button></div>
            </div>
            <div id="lista-cots"></div>
          </div>

          <div id="tab-historial" class="tab-pane-custom">
            <div id="lista-hist"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Modal cambiar estado -->
<div class="modal fade" id="modal-estado" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-2"><h6 class="modal-title mb-0">Cambiar estado</h6><button type="button" class="btn-close btn-sm" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <label class="form-label small">Nuevo estado</label>
        <select id="sel-estado-nuevo" class="form-select form-select-sm mb-2"></select>
        <label class="form-label small">Motivo <span class="text-danger">*</span></label>
        <textarea id="txt-motivo" class="form-control form-control-sm" rows="2" placeholder="¿Por qué cambia el estado?"></textarea>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-sm btn-primary" onclick="confirmarEstado()">Confirmar</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const ESTADOS = {
  prospectiva:        { label:'Prospectiva',             color:'#3B82F6' },
  diagnostico:        { label:'Levantamiento',           color:'#8B5CF6' },
  cotizacion_proceso: { label:'Cotización en Proceso',   color:'#F59E0B' },
  propuesta_enviada:  { label:'Propuesta Enviada',       color:'#EC4899' },
  propuesta_final:    { label:'Propuesta Final',         color:'#F97316' },
  documentacion:      { label:'Documentación',           color:'#6366F1' },
  poliza_activa:      { label:'Póliza Activa',           color:'#10B981' },
  gestion_continua:   { label:'Gestión / Mantenimiento', color:'#06B6D4' },
  renovacion:         { label:'Renovación',              color:'#EF4444' },
  renovado_activo:    { label:'Renovado / Activo',       color:'#22C55E' },
  churn:              { label:'Perdido / Churn',         color:'#64748B' },
};

let token = null;
let estadoFiltro = null;
let search = '';
let offset = 0;
const LIMIT = 20;
let convId = null;
let kpiConteos = {};

// ── AUTH ────────────────────────────────────────────────────────────────────

async function login() {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-error');
  const spin  = document.getElementById('login-spinner');

  errEl.classList.add('d-none');
  spin.classList.remove('d-none');

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error al iniciar sesión');

    token = data.token;
    localStorage.setItem('cg_token', token);
    localStorage.setItem('cg_nombre', data.nombre);
    mostrarPanel(data.nombre);
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('d-none');
  } finally {
    spin.classList.add('d-none');
  }
}

function cerrarSesion() {
  localStorage.removeItem('cg_token');
  localStorage.removeItem('cg_nombre');
  token = null;
  document.getElementById('panel-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function mostrarPanel(nombre) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('panel-screen').style.display = 'flex';
  document.getElementById('sidebar-user').textContent = nombre || 'Agente';
  renderSidebar();
  cargarKpis();
  cargarLista();
  setInterval(cargarKpis, 60000);
}

function api(url, opts = {}) {
  return fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(opts.headers || {}) },
  });
}

// ── INIT ────────────────────────────────────────────────────────────────────

(function init() {
  const t = localStorage.getItem('cg_token');
  const n = localStorage.getItem('cg_nombre');
  if (t) { token = t; mostrarPanel(n); }
})();

// ── SIDEBAR ─────────────────────────────────────────────────────────────────

function renderSidebar() {
  const el = document.getElementById('estados-lista');
  let html = `<div class="estado-item ${!estadoFiltro ? 'active' : ''}" onclick="filtrar(null)">
    <span><span class="estado-dot" style="background:#94a3b8"></span>Todas</span>
    <span class="badge-count">${Object.values(kpiConteos).reduce((a,b)=>a+b,0)||''}</span>
  </div>`;
  for (const [k, e] of Object.entries(ESTADOS)) {
    html += `<div class="estado-item ${estadoFiltro===k?'active':''}" onclick="filtrar('${k}')">
      <span><span class="estado-dot" style="background:${e.color}"></span>${e.label}</span>
      <span class="badge-count">${kpiConteos[k]||''}</span>
    </div>`;
  }
  el.innerHTML = html;
}

function filtrar(e) {
  estadoFiltro = e; offset = 0;
  renderSidebar();
  actualizarBadgeFiltro();
  cargarLista();
}

function actualizarBadgeFiltro() {
  const el = document.getElementById('filtro-badge');
  if (estadoFiltro) {
    const e = ESTADOS[estadoFiltro];
    el.innerHTML = `<span class="badge" style="background:${e.color}20;color:${e.color};border:1px solid ${e.color}40;font-size:11px;">${e.label} <span style="cursor:pointer" onclick="filtrar(null)">✕</span></span>`;
  } else { el.innerHTML = ''; }
}

function buscar(v) { search = v; offset = 0; cargarLista(); }

// ── KPIs ────────────────────────────────────────────────────────────────────

async function cargarKpis() {
  try {
    const r = await api('/api/dashboard/kpis');
    const d = await r.json();
    document.getElementById('kpi-nuevos').textContent     = d.hoy.nuevos_contactos;
    document.getElementById('kpi-pendientes').textContent = d.hoy.respuestas_pendientes;
    document.getElementById('kpi-propuestas').textContent = d.hoy.propuestas_enviadas;
    document.getElementById('kpi-polizas').textContent    = d.hoy.polizas_activadas;
    kpiConteos = d.conversaciones_por_estado || {};
    renderSidebar();
  } catch {}
}

// ── LISTA ───────────────────────────────────────────────────────────────────

async function cargarLista() {
  const sort = document.getElementById('sort-sel')?.value || 'mas_reciente';
  const p = new URLSearchParams({ limit: LIMIT, offset, sort_by: sort });
  if (estadoFiltro) p.set('estado', estadoFiltro);
  if (search)        p.set('search', search);
  try {
    const r = await api(`/api/conversaciones?${p}`);
    const d = await r.json();
    renderLista(d.conversaciones || []);
    renderPag(d.total || 0);
  } catch {
    document.getElementById('lista-conv').innerHTML = '<div class="text-danger small">Error cargando</div>';
  }
}

function renderLista(convs) {
  const el = document.getElementById('lista-conv');
  if (!convs.length) { el.innerHTML = '<div class="text-muted small text-center py-4">Sin conversaciones</div>'; return; }
  el.innerHTML = convs.map(c => {
    const e = ESTADOS[c.estado] || { label: c.estado, color: '#94a3b8' };
    const pc = { critica:'p-critica', alta:'p-alta', normal:'p-normal', baja:'p-baja' }[c.prioridad] || 'p-normal';
    const alerta = c.requiere_respuesta ? '<i class="bi bi-exclamation-circle-fill text-warning ms-1" title="Requiere respuesta"></i>' : '';
    return `<div class="conv-card ${convId===c.id?'selected':''}" onclick="abrirDetalle('${c.id}')">
      <div class="d-flex justify-content-between mb-1">
        <span class="conv-nombre">${esc(c.cliente_nombre)}${alerta}</span>
        <span class="prioridad-badge ${pc}">${c.prioridad}</span>
      </div>
      <div class="conv-preview">${esc(c.ultimo_mensaje?.contenido || 'Sin mensajes')}</div>
      <div class="d-flex justify-content-between mt-1">
        <span style="font-size:11px;background:${e.color}20;color:${e.color};padding:1px 7px;border-radius:10px;">${e.label}</span>
        <span style="font-size:11px;color:#94a3b8;">${c.cliente_telefono}</span>
      </div>
    </div>`;
  }).join('');
}

function renderPag(total) {
  const el = document.getElementById('paginacion');
  const totalP = Math.ceil(total / LIMIT);
  const pag = Math.floor(offset / LIMIT) + 1;
  if (totalP <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <button class="btn btn-sm btn-outline-secondary" ${offset===0?'disabled':''} onclick="cambiarPag(-1)"><i class="bi bi-chevron-left"></i></button>
    <span class="small text-muted">${pag}/${totalP} (${total})</span>
    <button class="btn btn-sm btn-outline-secondary" ${pag>=totalP?'disabled':''} onclick="cambiarPag(1)"><i class="bi bi-chevron-right"></i></button>`;
}

function cambiarPag(d) { offset = Math.max(0, offset + d * LIMIT); cargarLista(); }

// ── DETALLE ─────────────────────────────────────────────────────────────────

async function abrirDetalle(id) {
  convId = id;
  document.querySelectorAll('.conv-card').forEach(c => {
    c.classList.toggle('selected', c.getAttribute('onclick')?.includes(id));
  });
  document.getElementById('det-empty').style.display = 'none';
  document.getElementById('det-panel').style.display = 'block';

  try {
    const r = await api(`/api/conversaciones/${id}`);
    const d = await r.json();
    const c = d.conversacion;
    const e = ESTADOS[c.estado] || { label: c.estado, color: '#94a3b8' };
    const pc = { critica:'p-critica', alta:'p-alta', normal:'p-normal', baja:'p-baja' }[c.prioridad] || 'p-normal';

    document.getElementById('det-nombre').textContent = c.cliente_nombre;
    document.getElementById('det-tel').textContent    = c.cliente_telefono;
    document.getElementById('det-tipo').textContent   = c.tipo_seguro || 'Sin tipo';
    const estBadge = document.getElementById('det-estado');
    estBadge.textContent = e.label;
    estBadge.style.cssText = `background:${e.color}20;color:${e.color};border:1px solid ${e.color}40;`;
    const prioBadge = document.getElementById('det-prioridad');
    prioBadge.textContent = c.prioridad;
    prioBadge.className = `prioridad-badge ${pc}`;

    renderMensajes(d.mensajes || []);
    renderNotas(d.notas || []);
    renderCots(d.cotizaciones || []);
    renderHist(d.historial_estados || []);
    irTab('mensajes');
  } catch { document.getElementById('det-nombre').textContent = 'Error'; }
}

function renderMensajes(msgs) {
  const el = document.getElementById('mensajes-wrap');
  if (!msgs.length) { el.innerHTML = '<div class="text-muted small text-center">Sin mensajes</div>'; return; }
  el.innerHTML = msgs.map(m => {
    const cls   = { cliente:'burbuja-cliente', agente:'burbuja-agente' }[m.autor] || 'burbuja-sistema';
    const align = m.autor === 'agente' ? 'ms-auto' : m.autor === 'sistema' ? 'mx-auto' : '';
    const hora  = m.timestamp_mensaje ? new Date(m.timestamp_mensaje).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="burbuja ${cls} ${align}">${esc(m.contenido)}<div class="burbuja-hora">${hora}</div></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function renderNotas(notas) {
  document.getElementById('lista-notas').innerHTML = notas.length
    ? notas.map(n=>`<div class="nota-item"><strong>${esc(n.agente_nombre||'Agente')}</strong> · ${fmt(n.created_at)}<br>${esc(n.contenido)}</div>`).join('')
    : '<div class="text-muted small">Sin notas</div>';
}

function renderCots(cots) {
  document.getElementById('lista-cots').innerHTML = cots.length
    ? cots.map(c=>`<div class="cot-item"><strong>${esc(c.aseguradora)}</strong> · $${c.prima?Number(c.prima).toLocaleString('es-MX'):'—'} MXN · <em>${c.estado}</em><br><span class="text-muted small">${esc(c.cobertura||'')}</span></div>`).join('')
    : '<div class="text-muted small">Sin cotizaciones</div>';
}

function renderHist(hist) {
  document.getElementById('lista-hist').innerHTML = hist.length
    ? hist.map(h=>`<div class="hist-item"><strong>${esc(h.estado_anterior||'—')} → ${esc(h.estado_nuevo)}</strong> · ${fmt(h.timestamp)}<br><span class="text-muted">${esc(h.nombre_quien_realizo||h.realizado_por||'')}${h.motivo?' — '+esc(h.motivo):''}</span></div>`).join('')
    : '<div class="text-muted small">Sin historial</div>';
}

// ── TABS ────────────────────────────────────────────────────────────────────

const TAB_NAMES = { mensajes:'Mensajes', notas:'Notas', cotizaciones:'Cotizaciones', historial:'Historial' };
function irTab(tab) {
  document.querySelectorAll('.tab-pane-custom').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('#det-tabs .nav-link').forEach(l => {
    l.classList.toggle('active', l.textContent.trim() === TAB_NAMES[tab]);
  });
}

// ── CAMBIAR ESTADO ───────────────────────────────────────────────────────────

function abrirModalEstado() {
  const sel = document.getElementById('sel-estado-nuevo');
  sel.innerHTML = Object.entries(ESTADOS).map(([k,e])=>`<option value="${k}">${e.label}</option>`).join('');
  document.getElementById('txt-motivo').value = '';
  new bootstrap.Modal(document.getElementById('modal-estado')).show();
}

async function confirmarEstado() {
  const estado_nuevo = document.getElementById('sel-estado-nuevo').value;
  const motivo = document.getElementById('txt-motivo').value.trim();
  if (!motivo) { alert('El motivo es obligatorio'); return; }

  const r = await api(`/api/conversaciones/${convId}/estado`, {
    method: 'POST', body: JSON.stringify({ estado_nuevo, motivo }),
  });
  if (r.ok) {
    bootstrap.Modal.getInstance(document.getElementById('modal-estado')).hide();
    abrirDetalle(convId);
    cargarLista();
    cargarKpis();
  } else { alert('Error cambiando estado'); }
}

// ── NOTAS ────────────────────────────────────────────────────────────────────

async function guardarNota() {
  const contenido = document.getElementById('txt-nota').value.trim();
  if (!contenido) return;
  const r = await api(`/api/conversaciones/${convId}/notas`, {
    method: 'POST', body: JSON.stringify({ contenido }),
  });
  if (r.ok) { document.getElementById('txt-nota').value = ''; abrirDetalle(convId); }
}

// ── COTIZACIONES ─────────────────────────────────────────────────────────────

async function guardarCotizacion() {
  const aseguradora = document.getElementById('cot-aseg').value.trim();
  if (!aseguradora) { alert('Ingresa la aseguradora'); return; }
  const r = await api(`/api/conversaciones/${convId}/cotizaciones`, {
    method: 'POST', body: JSON.stringify({
      aseguradora,
      prima:     parseFloat(document.getElementById('cot-prima').value) || null,
      cobertura: document.getElementById('cot-cobertura').value.trim() || null,
      estado:    document.getElementById('cot-estado').value,
    }),
  });
  if (r.ok) {
    ['cot-aseg','cot-prima','cot-cobertura'].forEach(i => document.getElementById(i).value = '');
    abrirDetalle(convId);
  }
}

// ── UTILS ────────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmt(ts) {
  if (!ts) return '';
  return new Date(ts).toLocaleString('es-MX',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
